<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Áudio Amplificado Seguro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 255, 200, 0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
            border: 1px solid #333;
        }
        h2 { color: #00ffcc; margin-top: 0; text-transform: uppercase; font-weight: 900;}
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid #444;
            background-color: #222;
            color: #00ffcc;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }
        textarea:focus { border-color: #00ffcc; outline: none; }
        .slider-container { margin: 25px 0; text-align: left; }
        .slider-container label { font-weight: bold; font-size: 14px; display: flex; justify-content: space-between; margin-bottom: 10px;}
        input[type="range"] { width: 100%; accent-color: #00ffcc; }
        button {
            width: 100%;
            padding: 15px;
            background-color: #00ffcc;
            color: #121212;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 900;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        button:hover { background-color: #00ccaa; transform: scale(1.02); }
        button:disabled { background-color: #555; color: #aaa; cursor: not-allowed; transform: none; }
        .resultado {
            margin-top: 25px;
            display: none;
            background-color: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid #00ffcc;
        }
        audio { width: 100%; margin-top: 10px; outline: none; }
        .download-btn {
            display: block;
            margin-top: 15px;
            color: #00ffcc;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 10px;
            border: 1px solid #00ffcc;
            border-radius: 5px;
            transition: 0.2s;
        }
        .download-btn:hover { background-color: #00ffcc; color: #111; }
    </style>
</head>
<body>

<div class="container">
    <h2>Amplificador de Voz Seguro 🔊</h2>
    <p style="font-size: 14px; color: #aaa; margin-bottom: 20px;">Gere a voz com um controle de volume otimizado e seguro de até 10x o padrão.</p>
    
    <textarea id="texto" placeholder="Digite seu texto aqui..."></textarea>

    <div class="slider-container">
        <label><span>Multiplicador de Volume Limpo:</span> <span id="val-ganho" style="color: #00ffcc;">2x</span></label>
        <input type="range" id="ganho" min="1" max="10" step="1" value="2" oninput="document.getElementById('val-ganho').innerText = this.value + 'x'">
    </div>

    <button id="btn-processar" onclick="gerarEDestruir()">CRIAR ÁUDIO AMPLIFICADO</button>

    <div class="resultado" id="resultado">
        <p style="color: #00ffcc; margin-top: 0; font-weight: bold;">✅ Áudio Processado com Sucesso</p>
        <audio id="player" controls></audio>
        <a id="linkDownload" class="download-btn" href="#" download="voz_amplificada.wav">📥 Baixar Arquivo (.wav)</a>
    </div>
</div>

<script>
function bufferToWav(buffer) {
    const numChannels = buffer.numberOfChannels;
    const sampleRate = buffer.sampleRate;
    const format = 1; // PCM
    const bitDepth = 16;
    
    const result = new Float32Array(buffer.length * numChannels);
    for (let channel = 0; channel < numChannels; channel++) {
        const channelData = buffer.getChannelData(channel);
        for (let i = 0; i < buffer.length; i++) {
            result[i * numChannels + channel] = channelData[i];
        }
    }
    
    const byteRate = sampleRate * numChannels * (bitDepth / 8);
    const blockAlign = numChannels * (bitDepth / 8);
    const dataSize = result.length * (bitDepth / 8);
    const bufferLength = 44 + dataSize;
    const arrayBuffer = new ArrayBuffer(bufferLength);
    const view = new DataView(arrayBuffer);
    
    function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) { view.setUint8(offset + i, string.charCodeAt(i)); }
    }
    
    writeString(view, 0, 'RIFF'); view.setUint32(4, 36 + dataSize, true);
    writeString(view, 8, 'WAVE'); writeString(view, 12, 'fmt ');
    view.setUint32(16, 16, true); view.setUint16(20, format, true);
    view.setUint16(22, numChannels, true); view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true); view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitDepth, true); writeString(view, 36, 'data');
    view.setUint32(40, dataSize, true);
    
    let offset = 44;
    for (let i = 0; i < result.length; i++) {
        let sample = Math.max(-1, Math.min(1, result[i]));
        sample = sample < 0 ? sample * 32768 : sample * 32767;
        view.setInt16(offset, sample, true); offset += 2;
    }
    
    return new Blob([view], { type: 'audio/wav' });
}

async function gerarEDestruir() {
    const texto = document.getElementById('texto').value.trim();
    if (!texto) {
        alert("Por favor, digite um texto primeiro!");
        return;
    }
    if (texto.length > 200) {
        alert("Texto muito longo! Use frases mais curtas.");
        return;
    }

    const btn = document.getElementById('btn-processar');
    btn.disabled = true;
    btn.innerText = "Processando áudio...";
    document.getElementById('resultado').style.display = 'none';

    try {
        // CORREÇÃO DA ROTA: Puxando direto da sua API do Vercel sem usar proxies públicos
        const urlAPI = `/api/tts?text=${encodeURIComponent(texto)}`;
        
        const response = await fetch(urlAPI);
        if (!response.ok) throw new Error("Erro na requisição");
        
        const arrayBuffer = await response.arrayBuffer();
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        
        const offlineCtx = new OfflineAudioContext(
            originalBuffer.numberOfChannels,
            originalBuffer.length,
            originalBuffer.sampleRate
        );

        const source = offlineCtx.createBufferSource();
        source.buffer = originalBuffer;

        const gainNode = offlineCtx.createGain();
        const multiplicador = parseFloat(document.getElementById('ganho').value);
        gainNode.gain.value = multiplicador; 

        // Adicionando um compressor/limiter dinâmico profissional para evitar que o áudio estoure
        const limiter = offlineCtx.createDynamicsCompressor();
        limiter.threshold.setValueAtTime(-1.0, offlineCtx.currentTime); // Ativa perto do limite máximo
        limiter.knee.setValueAtTime(0.0, offlineCtx.currentTime);       // Curva firme (Hard Limiter)
        limiter.ratio.setValueAtTime(20.0, offlineCtx.currentTime);     // Taxa de compressão máxima
        limiter.attack.setValueAtTime(0.001, offlineCtx.currentTime);   // Resposta instantânea
        limiter.release.setValueAtTime(0.05, offlineCtx.currentTime);   // Recuperação rápida

        // Conexão dos nós: Fonte -> Ganho -> Limiter -> Destino
        source.connect(gainNode);
        gainNode.connect(limiter);
        limiter.connect(offlineCtx.destination);
        source.start();

        const renderedBuffer = await offlineCtx.startRendering();
        const wavBlob = bufferToWav(renderedBuffer);
        const url = URL.createObjectURL(wavBlob);

        document.getElementById('player').src = url;
        const link = document.getElementById('linkDownload');
        link.href = url;
        link.download = `audio_${multiplicador}x.wav`;
        
        document.getElementById('resultado').style.display = 'block';

    } catch (e) {
        alert("Não foi possível gerar a voz no momento. Verifique a API do seu Vercel.");
        console.error(e);
    } finally {
        btn.disabled = false;
        btn.innerText = "CRIAR ÁUDIO AMPLIFICADO";
    }
}
</script>

</body>
</html>
